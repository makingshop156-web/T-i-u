<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài Shortcuts</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0b0f15;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px;text-align:center}
        h1{font-size:22px;margin:20px 0 8px;background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        p{font-size:13px;color:#6b7684;margin-bottom:20px}
        .btn{display:block;padding:16px;margin:10px auto;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;max-width:320px;transition:transform .2s}
        .btn:active{transform:scale(.96)}
        .btn.p{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff}
        .btn.e{background:#1a3a1a;color:#3fb950;border:1px solid #2d5a2d}
        .btn.o{background:#131920;color:#6b7684;border:1px solid #1e2530}
        .note{font-size:11px;color:#6b7684;margin-top:20px;padding:12px;background:#131920;border-radius:12px;text-align:left;line-height:1.6}
        .step{color:#4facfe;font-weight:600}
    </style>
</head>
<body>
    <h1>🚀 CÀI 3 SHORTCUTS</h1>
    <p>Bấm từng nút bên dưới để cài</p>

    <a class="btn p" href="shortcuts://import-shortcut?url=https://raw.githubusercontent.com/makingshop156-web/T-i-u/main/shortcuts/GameBoostPerf.plist">
        ⚡ GameBoostPerf
    </a>
    <a class="btn e" href="shortcuts://import-shortcut?url=https://raw.githubusercontent.com/makingshop156-web/T-i-u/main/shortcuts/GameBoostEco.plist">
        🔋 GameBoostEco
    </a>
    <a class="btn o" href="shortcuts://import-shortcut?url=https://raw.githubusercontent.com/makingshop156-web/T-i-u/main/shortcuts/GameBoostOFF.plist">
        ⏹ GameBoostOFF
    </a>

    <div class="note">
        <div><span class="step">1.</span> Bấm từng nút trên → tự mở app Shortcuts</div>
        <div><span class="step">2.</span> Bấm <b>"Add Untrusted Shortcut"</b></div>
        <div><span class="step">3.</span> Làm 3 lần cho cả 3 cái</div>
        <div style="margin-top:8px;color:#d29922;">⚠️ Nếu không mở được, thử Safari sang Chrome.</div>
    </div>
</body>
</html>
